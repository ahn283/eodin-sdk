name: CI

# Builds + tests every SDK channel. Commands mirror what was verified locally
# (deeplink-reliability Phase 6 — CI 검증). Channels:
#   - sdk-flutter      (ubuntu)  flutter analyze + test
#   - sdk-android      (ubuntu)  ./gradlew testDebugUnitTest assembleRelease
#   - web-capacitor-ts (ubuntu)  npm ci + build/test eodin-web + @eodin/capacitor
#   - sdk-ios          (macOS)   xcodebuild build + test (iOS Simulator)
#   - capacitor-ios    (macOS)   xcodebuild build (iOS Simulator)
#
# NOTE: packages/capacitor/android is intentionally NOT built here — it declares
# `implementation project(':capacitor-android')`, i.e. it only resolves inside a
# host Capacitor app's Gradle build. It is verified in the host app's CI
# (kidstopia), not standalone.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk-flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  sdk-android:
    name: Android (unit tests + AAR)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Gradle build + unit tests
        run: ./gradlew testDebugUnitTest assembleRelease --no-daemon --stacktrace

  web-capacitor-ts:
    name: Web + Capacitor (TS build + jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # npm workspace install at the repo root links eodin-web -> packages/sdk-web.
      - run: npm ci
      # @eodin/capacitor imports `eodin-web/internal`, whose exports map points at
      # eodin-web's dist/, so eodin-web must be built before capacitor compiles.
      - name: Build eodin-web
        run: npm run build -w eodin-web
      - name: Test eodin-web
        run: npm test -w eodin-web
      - name: Build @eodin/capacitor
        run: npm run build -w @eodin/capacitor
      - name: Test @eodin/capacitor
        run: npm test -w @eodin/capacitor

  sdk-ios:
    name: iOS (build + XCTest)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/sdk-ios
    steps:
      - uses: actions/checkout@v4
      - name: Select an available iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; print(next(x["udid"] for rt in d for x in d[rt] if x.get("isAvailable") and "iPhone" in x["name"]))')
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator $UDID"
      - name: Build (EodinSDK)
        run: xcodebuild build -scheme EodinSDK -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"
      - name: Test (EodinSDK-Package)
        run: xcodebuild test -scheme EodinSDK-Package -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"

  capacitor-ios:
    name: Capacitor iOS (build)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/capacitor
    steps:
      - uses: actions/checkout@v4
      - name: Select an available iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; print(next(x["udid"] for rt in d for x in d[rt] if x.get("isAvailable") and "iPhone" in x["name"]))')
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
      - name: Build (EodinCapacitor)
        run: xcodebuild build -scheme EodinCapacitor -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"
