name: eodin_sdk
description: Eodin SDK for Flutter — Analytics + Deferred Deep Link (and future Auth). Renamed from eodin_deeplink in v2.0.0 — host apps update pubspec dependency name + imports during Phase 5 migration.
version: 2.0.0-beta.1
homepage: https://github.com/ahn283/eodin-sdk
repository: https://github.com/ahn283/eodin-sdk
issue_tracker: https://github.com/ahn283/eodin-sdk/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  device_info_plus: ^9.1.0
  crypto: ^3.0.3
  uuid: ^4.2.1
  connectivity_plus: ^6.0.4
  hive: ^2.2.3
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.0

# Pure Dart package - no native code required
